<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Microphone body -->
  <rect x="13" y="6" width="6" height="11" rx="3" fill="#7C3AED"/>

  <!-- Microphone arc -->
  <path d="M10 15.5a6 6 0 0 0 12 0" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Mic stand line -->
  <line x1="16" y1="21.5" x2="16" y2="25" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>

  <!-- Mic base -->
  <line x1="12.5" y1="25" x2="19.5" y2="25" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
</svg>
